<section class="home-shell">
	<header class="top-header">
		<div class="container header-inner">
			<nav class="main-nav">
				<a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
				<a routerLink="/invitados" routerLinkActive="active-link">Invitados</a>
				<a routerLink="/detalles" routerLinkActive="active-link">Detalles</a>
				<a routerLink="/confirmacion" routerLinkActive="active-link">Confirmación</a>
			</nav>

			<div class="header-login" *ngIf="!adminAuthService.isLoggedIn(); else loggedUser">
				<a class="login-icon-btn" routerLink="/admin/login" aria-label="Ir a login">
					<span class="icon-user" aria-hidden="true"></span>
				</a>
			</div>

			<ng-template #loggedUser>
				<div class="logged-box">
					<span>{{ adminAuthService.getNombre() }}</span>
					<button type="button" (click)="logoutDesdeHeader()">Salir</button>
				</div>
			</ng-template>
		</div>
	</header>

	<main class="home-content">
		<section class="hero-image-wrap" aria-label="Imagen principal de la boda">
			<img
				class="hero-image"
				src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=2000&q=80"
				alt="Pareja celebrando su boda"
			/>
		</section>

		<section class="home-info">
			<h1 class="couple-title">Rocío &amp; Manuel</h1>
			<div class="countdown-container" aria-live="polite">
				<div class="countdown-column">
					<span class="countdown-number">{{ countdownDays }}</span>
					<span class="countdown-label">Días</span>
				</div>
				<div class="countdown-column">
					<span class="countdown-number">{{ countdownHours }}</span>
					<span class="countdown-label">Horas</span>
				</div>
				<div class="countdown-column">
					<span class="countdown-number">{{ countdownMinutes }}</span>
					<span class="countdown-label">Min</span>
				</div>
				<div class="countdown-column">
					<span class="countdown-number">{{ countdownSeconds }}</span>
					<span class="countdown-label">Seg</span>
				</div>
			</div>
			<p class="save-date">SAVE DE DATE</p>
			<p class="event-date">Sábado 10 de abril de 2027</p>
		</section>
	</main>
</section>
